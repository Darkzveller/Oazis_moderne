<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OASIS — Mes Notes</title>
  <meta name="description" content="Tableau de bord des notes OASIS — Polytech Sorbonne" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & tokens ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0e1a;
      --bg-card:  #111627;
      --bg-glass: rgba(17, 22, 39, 0.7);
      --border:   rgba(255,255,255,0.07);
      --accent:   #6c63ff;
      --accent2:  #a78bfa;
      --good:     #34d399;
      --warn:     #fbbf24;
      --bad:      #f87171;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --radius:   14px;
      --radius-sm:8px;
      --shadow:   0 4px 32px rgba(0,0,0,0.45);
      --trans:    0.22s cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background animated blobs ──────────────────────────────────────── */
    .blobs {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.18;
      animation: blobPulse 8s ease-in-out infinite alternate;
    }
    .blob-1 { width:500px;height:500px;background:#6c63ff;top:-120px;left:-100px;animation-delay:0s; }
    .blob-2 { width:400px;height:400px;background:#a78bfa;bottom:-100px;right:-80px;animation-delay:-3s; }
    .blob-3 { width:300px;height:300px;background:#34d399;top:40%;left:50%;animation-delay:-5s; }
    @keyframes blobPulse {
      0%   { transform: scale(1) translate(0,0); }
      100% { transform: scale(1.15) translate(20px, -20px); }
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .app { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 0 20px 80px; }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      padding: 40px 0 28px;
      display: flex; align-items: center; gap: 16px;
    }
    .logo-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg,#6c63ff,#a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      box-shadow: 0 0 24px rgba(108,99,255,0.4);
    }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    header p  { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }

    /* ── Login card ──────────────────────────────────────────────────────── */
    #loginSection {
      display: flex; justify-content: center; padding: 40px 0;
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%; max-width: 420px;
      box-shadow: var(--shadow);
      animation: fadeUp .4s ease both;
    }
    .login-card h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
    .login-card p  { font-size: 0.83rem; color: var(--muted); margin-bottom: 28px; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .6px;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%; padding: 12px 16px; border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text); font-size: 0.95rem; font-family: inherit;
      outline: none; transition: border var(--trans), box-shadow var(--trans);
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.18);
    }

    .btn-primary {
      width: 100%; padding: 13px; border: none; border-radius: var(--radius-sm);
      background: linear-gradient(135deg,#6c63ff,#a78bfa);
      color: #fff; font-size: 0.95rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: transform var(--trans), box-shadow var(--trans), opacity var(--trans);
      box-shadow: 0 4px 20px rgba(108,99,255,0.35);
    }
    .btn-primary:hover  { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(108,99,255,0.45); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-msg {
      margin-top: 14px; padding: 10px 14px; border-radius: var(--radius-sm);
      background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3);
      color: #fca5a5; font-size: 0.83rem; display: none;
    }
    .error-msg.show { display: block; animation: fadeUp .2s ease both; }

    /* ── Dashboard ───────────────────────────────────────────────────────── */
    #dashboard { display: none; animation: fadeUp .4s ease both; }

    /* ── User bar ────────────────────────────────────────────────────────── */
    .user-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .user-bar span { font-size: 0.88rem; color: var(--muted); }
    .btn-logout {
      padding: 6px 16px; border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-size: 0.8rem; font-family: inherit; cursor: pointer;
      transition: all var(--trans);
    }
    .btn-logout:hover { border-color: var(--bad); color: var(--bad); }

    /* ── Semester tabs ───────────────────────────────────────────────────── */
    .semester-bar {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .sem-btn {
      padding: 8px 20px; border-radius: 100px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--muted); font-size: 0.88rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: all var(--trans);
    }
    .sem-btn:hover {
      border-color: var(--accent2); color: var(--accent2);
      background: rgba(167,139,250,0.08);
    }
    .sem-btn.active {
      background: linear-gradient(135deg,#6c63ff,#a78bfa);
      border-color: transparent; color: #fff;
      box-shadow: 0 4px 16px rgba(108,99,255,0.35);
    }

    /* ── Semester header ─────────────────────────────────────────────────── */
    .sem-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .sem-title { font-size: 1.3rem; font-weight: 700; }
    .sem-avg-badge {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 18px; border-radius: 100px;
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.3);
      font-size: 0.88rem; font-weight: 600; color: var(--accent2);
    }
    .sem-avg-badge span { font-size: 1.1rem; font-weight: 800; color: #fff; }

    /* ── Module list ───────────────────────────────────────────────────────────── */
    .modules-list { display: flex; flex-direction: column; gap: 12px; }

    .module-row {
      display: flex; flex-direction: column;
      padding: 18px 22px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color var(--trans), box-shadow var(--trans);
      animation: fadeUp .3s ease both;
    }
    .module-row:hover {
      border-color: rgba(108,99,255,0.25);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    /* Ligne du haut : nom + note */
    .module-top {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 0;
    }
    .module-name {
      font-size: 1rem; font-weight: 600; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .module-grade {
      font-size: 1.05rem; font-weight: 700; min-width: 52px; text-align: right;
      cursor: pointer; padding: 4px 10px; border-radius: var(--radius-sm);
      transition: all var(--trans); border: 1px solid transparent;
    }
    .module-grade:hover {
      background: rgba(108,99,255,0.15);
      border-color: rgba(108,99,255,0.3);
      color: var(--accent2);
    }
    .module-grade.grade-good  { color: var(--good); }
    .module-grade.grade-warn  { color: var(--warn); }
    .module-grade.grade-bad   { color: var(--bad); }
    .module-grade.grade-none  { color: var(--muted); font-size: 0.8rem; cursor: default; }
    .module-grade.grade-none:hover { background: none; border-color: transparent; color: var(--muted); }

    .module-coeff {
      font-size: 0.72rem; color: var(--muted); font-weight: 500;
      white-space: nowrap; flex-shrink: 0;
    }

    /* Séparateur entre la note et les épreuves */
    .module-divider {
      height: 1px; background: var(--border);
      margin: 12px 0 10px;
    }

    /* Épreuves individuelles sous chaque module */
    .module-epreuves { display: flex; flex-direction: column; gap: 5px; }
    .ep-line {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem;
    }
    .ep-name {
      flex: 1; color: rgba(148,163,184,0.75);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ep-date {
      font-size: 0.7rem; color: rgba(100,116,139,0.65); flex-shrink: 0;
    }
    .ep-dots {
      flex: 0 0 24px; border-bottom: 1px dotted rgba(255,255,255,0.08);
    }
    .ep-grade {
      font-weight: 600; min-width: 52px; text-align: right;
      flex-shrink: 0; font-size: 0.82rem;
    }
    .ep-grade.grade-good  { color: rgba(52,211,153,0.65); }
    .ep-grade.grade-warn  { color: rgba(251,191,36,0.65); }
    .ep-grade.grade-bad   { color: rgba(248,113,113,0.65); }
    .ep-grade.grade-none  { color: rgba(100,116,139,0.55); }
    /* Note cliquable : curseur + halo au survol */
    .ep-grade.clickable {
      cursor: pointer; border-radius: 6px;
      padding: 1px 6px; margin: -1px -6px;
      transition: background var(--trans), filter var(--trans);
    }
    .ep-grade.clickable:hover {
      background: rgba(108,99,255,0.12);
      filter: brightness(1.4);
    }

    /* ── Modal ───────────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px; opacity: 0; pointer-events: none;
      transition: opacity .2s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: #13192b;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0;
      width: 100%; max-width: 520px;
      max-height: 90vh;
      display: flex; flex-direction: column;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      transform: translateY(20px) scale(0.97);
      transition: transform .25s cubic-bezier(.34,1.56,.64,1);
      overflow: hidden;
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }

    /* Partie fixe en haut */
    .modal-fixed {
      padding: 28px 32px 0;
      flex-shrink: 0;
    }
    /* Partie scrollable en bas */
    .modal-scrollable {
      padding: 0 32px 28px;
      overflow-y: auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: rgba(108,99,255,0.3) transparent;
    }
    .modal-scrollable::-webkit-scrollbar { width: 4px; }
    .modal-scrollable::-webkit-scrollbar-thumb {
      background: rgba(108,99,255,0.3); border-radius: 2px;
    }

    .modal-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 4px;
    }
    /* Grand titre de la matière */
    .modal-subject-name {
      font-size: 1.55rem; font-weight: 800; line-height: 1.2;
      letter-spacing: -0.5px; flex: 1; padding-right: 14px;
      background: linear-gradient(135deg, #e2e8f0, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .modal-close {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--muted); font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all var(--trans);
    }
    .modal-close:hover { background: rgba(248,113,113,0.15); border-color: var(--bad); color: var(--bad); }
    .modal-subject-sigle {
      font-size: 0.72rem; color: var(--muted); font-weight: 500;
      letter-spacing: .5px; margin-bottom: 20px; margin-top: 4px;
    }

    /* Grade hero */
    .grade-hero {
      text-align: center; margin-bottom: 20px;
      padding: 20px; border-radius: var(--radius);
      background: linear-gradient(135deg,rgba(108,99,255,0.15),rgba(167,139,250,0.1));
      border: 1px solid rgba(108,99,255,0.2);
    }
    .grade-hero .grade-value {
      font-size: 3rem; font-weight: 800; letter-spacing: -1px; line-height: 1;
    }
    .grade-hero .grade-label {
      font-size: 0.78rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: .6px; margin-top: 6px;
    }

    /* Stats grid */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat-card {
      padding: 14px 16px; border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
    }
    .stat-card .stat-label {
      font-size: 0.72rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: .5px; font-weight: 600; margin-bottom: 6px;
    }
    .stat-card .stat-value {
      font-size: 1.25rem; font-weight: 700;
    }
    .stat-value.color-good { color: var(--good); }
    .stat-value.color-warn { color: var(--warn); }
    .stat-value.color-bad  { color: var(--bad); }

    /* Bar chart inside modal */
    .grade-bar-wrap {
      margin-top: 16px; padding: 14px 18px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
    }
    .grade-bar-wrap .bar-label {
      font-size: 0.72rem; color: var(--muted); letter-spacing: .5px;
      text-transform: uppercase; font-weight: 600; margin-bottom: 10px;
    }
    .bar-track {
      height: 8px; border-radius: 100px;
      background: rgba(255,255,255,0.07); position: relative; margin-bottom: 6px;
    }
    .bar-fill {
      height: 100%; border-radius: 100px;
      background: linear-gradient(90deg,#6c63ff,#a78bfa);
      transition: width .7s cubic-bezier(.4,0,.2,1);
    }
    .bar-legend {
      display: flex; justify-content: space-between;
      font-size: 0.7rem; color: var(--muted);
    }

    /* ── Épreuves individuelles ──────────────────────────────────────────── */
    .epreuves-section {
      margin-top: 20px;
    }
    .epreuves-title {
      font-size: 0.72rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: .5px; font-weight: 600; margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .epreuves-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .epreuve-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      margin-bottom: 8px;
      transition: border-color var(--trans), background var(--trans);
      animation: fadeUp .25s ease both;
    }
    .epreuve-row:hover {
      background: rgba(108,99,255,0.07);
      border-color: rgba(108,99,255,0.25);
    }
    .epreuve-info { flex: 1; min-width: 0; }
    .epreuve-nom {
      font-size: 0.88rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .epreuve-date {
      font-size: 0.72rem; color: var(--muted); margin-top: 2px;
    }
    .epreuve-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .epreuve-grade {
      font-size: 1rem; font-weight: 700; min-width: 48px; text-align: right;
    }
    .epreuve-coeff {
      font-size: 0.68rem; color: var(--muted);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      padding: 2px 7px; border-radius: 100px;
    }
    /* Mini barre dans chaque épreuve */
    .epreuve-minibar {
      width: 60px; height: 4px; border-radius: 100px;
      background: rgba(255,255,255,0.07); position: relative;
      flex-shrink: 0;
    }
    .epreuve-minibar-fill {
      height: 100%; border-radius: 100px;
      background: linear-gradient(90deg,#6c63ff,#a78bfa);
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }

    /* ── Spinner ─────────────────────────────────────────────────────────── */
    #loadingOverlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(11,14,26,0.85); backdrop-filter: blur(8px);
      gap: 18px; display: none;
    }
    .spinner {
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid rgba(108,99,255,0.2);
      border-top-color: var(--accent);
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingOverlay p { color: var(--muted); font-size: 0.9rem; }

    /* ── Animations ──────────────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Vue UE ───────────────────────────────────────────────────────────── */

    /* Sélecteur de vue */
    .view-switcher {
      display: flex; gap: 8px; margin-bottom: 20px;
    }
    .view-btn {
      padding: 6px 18px; border-radius: 100px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--muted); font-size: 0.82rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: all var(--trans);
    }
    .view-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .view-btn.active {
      background: rgba(108,99,255,0.15);
      border-color: rgba(108,99,255,0.4); color: var(--accent2);
    }

    /* Bannière UE */
    .ues-list { display: flex; flex-direction: column; gap: 20px; }

    .ue-banner {
      border-radius: 16px; overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-card);
      animation: fadeUp .35s ease both;
    }

    /* En-tête de la bannière */
    .ue-header {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 24px;
      background: linear-gradient(135deg,
        rgba(108,99,255,0.18) 0%,
        rgba(167,139,250,0.08) 100%);
      border-bottom: 1px solid var(--border);
    }
    .ue-title-block { flex: 1; min-width: 0; }
    .ue-name {
      font-size: 1.15rem; font-weight: 800; letter-spacing: -0.3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ue-code {
      font-size: 0.68rem; color: var(--muted); margin-top: 2px;
      font-weight: 500; letter-spacing: .4px;
    }
    .ue-ects-badge {
      padding: 4px 12px; border-radius: 100px;
      background: rgba(108,99,255,0.2);
      border: 1px solid rgba(108,99,255,0.3);
      font-size: 0.72rem; font-weight: 700; color: var(--accent2);
      white-space: nowrap; flex-shrink: 0;
    }
    .ue-avg {
      font-size: 1.3rem; font-weight: 800;
      white-space: nowrap; flex-shrink: 0;
    }

    /* Ligne de stats UE */
    .ue-stats {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
    }
    .ue-stat {
      flex: 1; text-align: center;
      padding: 8px 4px;
      border-right: 1px solid var(--border);
    }
    .ue-stat:last-child { border-right: none; }
    .ue-stat-label {
      font-size: 0.62rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: .5px; font-weight: 600;
    }
    .ue-stat-value {
      font-size: 0.88rem; font-weight: 700; margin-top: 2px;
    }

    /* Modules imbriqués dans la bannière UE */
    .ue-modules { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }

    .ue-module-row {
      display: flex; flex-direction: column;
      padding: 12px 16px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: var(--radius-sm);
      transition: border-color var(--trans);
    }
    .ue-module-row:hover { border-color: rgba(108,99,255,0.2); }

    .ue-module-top {
      display: flex; align-items: center; gap: 10px;
    }
    .ue-module-name {
      flex: 1; font-size: 0.9rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ue-module-coeff {
      font-size: 0.68rem; color: var(--muted); flex-shrink: 0;
    }
    .ue-module-grade {
      font-size: 0.95rem; font-weight: 800;
      flex-shrink: 0; cursor: pointer;
      padding: 2px 10px; border-radius: 100px;
      border: 1px solid transparent;
      transition: all var(--trans);
    }
    .ue-module-grade:hover {
      background: rgba(108,99,255,0.12); border-color: rgba(108,99,255,0.3);
    }
    .ue-module-grade.grade-good { color: var(--good); }
    .ue-module-grade.grade-warn { color: var(--warn); }
    .ue-module-grade.grade-bad  { color: var(--bad); }
    .ue-module-grade.grade-none { color: var(--muted); font-size: 0.75rem; cursor: default; }
    .ue-module-grade.grade-none:hover { background: none; border-color: transparent; }

    .ue-ep-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 8px 0 6px; }
    .ue-epreuves   { display: flex; flex-direction: column; gap: 4px; }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 560px) {
      .login-card { padding: 28px 20px; }
      .stats-grid  { grid-template-columns: 1fr; }
      .modal-fixed     { padding: 20px 18px 0; }
      .modal-scrollable { padding: 0 18px 20px; }
      .modal-subject-name { font-size: 1.25rem; }
      .grade-hero .grade-value { font-size: 2.2rem; }
      .module-name { font-size: 0.87rem; }
    }
  </style>
</head>
<body>

<!-- Arrière-plan animé -->
<div class="blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<!-- Spinner de chargement -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <p>Connexion à OASIS…</p>
</div>

<div class="app">
  <header>
    <div class="logo-icon">🎓</div>
    <div>
      <h1>OASIS — Mes Notes</h1>
      <p>Polytech Sorbonne</p>
    </div>
  </header>

  <!-- ── Section de connexion ──────────────────────────────────────────── -->
  <section id="loginSection">
    <div class="login-card">
      <h2>Connexion</h2>
      <p>Entrez vos identifiants OASIS pour afficher vos notes.</p>

      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label for="loginInput">Numéro étudiant</label>
          <input id="loginInput" type="text" placeholder="Ex : 21517175"
                 autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="passwordInput">Mot de passe</label>
          <input id="passwordInput" type="password" placeholder="••••••••"
                 autocomplete="current-password" required />
        </div>
        <button id="loginBtn" type="submit" class="btn-primary">Se connecter</button>
        <div id="loginError" class="error-msg"></div>
      </form>
    </div>
  </section>

  <!-- ── Dashboard (notes) ─────────────────────────────────────────────── -->
  <section id="dashboard">
    <div class="user-bar">
      <span id="userLabel"></span>
      <button class="btn-logout" id="logoutBtn">Se déconnecter</button>
    </div>

    <!-- Barre de sélection de semestre -->
    <div class="semester-bar" id="semesterBar"></div>

    <!-- Sélecteur de vue : Matières | Par UE -->
    <div class="view-switcher">
      <button class="view-btn active" id="viewModules">Matières</button>
      <button class="view-btn" id="viewUes">Par UE</button>
    </div>

    <!-- En-tête du semestre sélectionné -->
    <div class="sem-header">
      <h2 class="sem-title" id="semTitle"></h2>
      <div class="sem-avg-badge" id="semAvgBadge"></div>
    </div>

    <!-- Vue matières (par défaut) -->
    <div class="modules-list" id="modulesList"></div>

    <!-- Vue UEs -->
    <div class="ues-list" id="uesList" style="display:none"></div>
  </section>
</div>

<!-- ── Modal de détail ──────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
  <div class="modal">
    <!-- Partie fixe : titre de la matière + note globale -->
    <div class="modal-fixed">
      <div class="modal-header">
        <h2 class="modal-subject-name" id="modalSubjectName"></h2>
        <button class="modal-close" id="modalClose" aria-label="Fermer">✕</button>
      </div>
      <div class="modal-subject-sigle" id="modalSubjectSigle"></div>
    </div>

    <!-- Partie scrollable : stats + épreuves -->
    <div class="modal-scrollable">
      <div class="grade-hero">
        <div class="grade-value" id="modalGradeValue"></div>
        <div class="grade-label">Note du module</div>
      </div>
      <div class="stats-grid" id="modalStats"></div>
      <div class="grade-bar-wrap" id="modalBarWrap">
        <div class="bar-label">Positionnement dans la classe</div>
        <div class="bar-track">
          <div class="bar-fill" id="modalBarFill" style="width:0%"></div>
        </div>
        <div class="bar-legend">
          <span id="barLegendMin"></span>
          <span id="barLegendMoy"></span>
          <span id="barLegendMax"></span>
        </div>
      </div>

      <!-- Liste des épreuves -->
      <div class="epreuves-section" id="epreuvesSection">
        <div class="epreuves-title">Épreuves</div>
        <div id="epreuvesList"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ── State ──────────────────────────────────────────────────────────────── */
let allData    = null;   // { semestres: [...] }
let currentSem = 0;      // index dans allData.semestres
let loginValue = '';
let currentView = 'modules'; // 'modules' | 'ues'

/* ── Helpers ────────────────────────────────────────────────────────────── */
const $ = id => document.getElementById(id);

function fmt(v) {
  if (v === null || v === undefined) return '—';
  return Number(v).toLocaleString('fr-FR', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function gradeClass(v) {
  if (v === null) return 'grade-none';
  if (v >= 14)   return 'grade-good';
  if (v >= 10)   return 'grade-warn';
  return 'grade-bad';
}

function colorClass(v) {
  if (v === null) return '';
  if (v >= 14)   return 'color-good';
  if (v >= 10)   return 'color-warn';
  return 'color-bad';
}

function setLoading(on) {
  $('loadingOverlay').style.display = on ? 'flex' : 'none';
}

/* ── Login ──────────────────────────────────────────────────────────────── */
$('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const login    = $('loginInput').value.trim();
  const password = $('passwordInput').value.trim();
  const errDiv   = $('loginError');
  errDiv.classList.remove('show');

  $('loginBtn').disabled = true;
  $('loginBtn').textContent = 'Connexion…';
  setLoading(true);

  try {
    const res  = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login, password }),
    });
    const json = await res.json();

    if (!json.ok) throw new Error(json.error || 'Erreur inconnue');

    loginValue = login;
    allData    = json.data;
    showDashboard();

  } catch (err) {
    errDiv.textContent = err.message;
    errDiv.classList.add('show');
  } finally {
    $('loginBtn').disabled = false;
    $('loginBtn').textContent = 'Se connecter';
    setLoading(false);
  }
});

/* ── Dashboard ──────────────────────────────────────────────────────────── */
function showDashboard() {
  $('loginSection').style.display = 'none';
  $('dashboard').style.display    = 'block';
  $('userLabel').textContent       = `Connecté en tant que ${loginValue}`;

  const bar = $('semesterBar');
  bar.innerHTML = '';

  allData.semestres.forEach((sem, i) => {
    const btn = document.createElement('button');
    btn.className = 'sem-btn' + (i === 0 ? ' active' : '');
    btn.id        = `sem-btn-${i}`;
    btn.textContent = sem.label;
    btn.addEventListener('click', () => selectSemester(i));
    bar.appendChild(btn);
  });

  selectSemester(0);
}

function selectSemester(idx) {
  currentSem = idx;

  // Mettre à jour les boutons
  document.querySelectorAll('.sem-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });

  const sem = allData.semestres[idx];
  $('semTitle').textContent = `${sem.label} — ${sem.year_label}`;

  // Badge moyenne
  const badge = $('semAvgBadge');
  if (sem.average !== null) {
    badge.innerHTML = `Moyenne <span>${fmt(sem.average)} / 20</span>`;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }

  renderModules(sem.modules);
  renderUes(sem.ues || []);
}

function renderModules(modules) {
  const list = $('modulesList');
  list.innerHTML = '';

  if (!modules.length) {
    list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">Aucune donnée disponible.</p>';
    return;
  }

  modules.forEach((mod, i) => {
    const row = document.createElement('div');
    row.className = 'module-row';
    row.style.animationDelay = `${i * 40}ms`;

    const hasGrade = mod.note !== null;
    const gc       = gradeClass(mod.note);
    const epreuves = mod.epreuves || [];

    // ── Ligne du haut : nom + note + coeff ───────────────────────────
    const top = document.createElement('div');
    top.className = 'module-top';
    top.innerHTML = `
      <span class="module-name" title="${mod.nom}">${mod.nom}</span>
      <span class="module-coeff">×${fmt(mod.coeff)}</span>
      <span class="module-grade ${gc}"
            ${hasGrade ? 'role="button" tabindex="0" title="Voir les statistiques"' : ''}>
        ${hasGrade ? fmt(mod.note) + ' / 20' : 'N/A'}
      </span>
    `;
    if (hasGrade) {
      const gradeEl = top.querySelector('.module-grade');
      gradeEl.addEventListener('click', () => openModal(mod));
      gradeEl.addEventListener('keydown', e => { if (e.key === 'Enter') openModal(mod); });
    }
    row.appendChild(top);

    // ── Épreuves en dessous (si disponibles) ──────────────────────────
    if (epreuves.length > 0) {
      const div = document.createElement('div');
      div.className = 'module-divider';
      row.appendChild(div);

      const epContainer = document.createElement('div');
      epContainer.className = 'module-epreuves';

      epreuves.forEach(ep => {
        const epGc    = gradeClass(ep.note);
        const hasNote = ep.note !== null;
        const line = document.createElement('div');
        line.className = 'ep-line';
        line.innerHTML = `
          <span class="ep-name" title="${ep.nom}">${ep.nom}</span>
          ${ep.date ? `<span class="ep-date">${ep.date}</span>` : ''}
          <span class="ep-dots"></span>
          <span class="ep-grade ${epGc}${hasNote ? ' clickable' : ''}">${hasNote ? fmt(ep.note) + '\u00a0/ 20' : '\u2014'}</span>
        `;
        if (hasNote) {
          const epGradeEl = line.querySelector('.ep-grade');
          epGradeEl.addEventListener('click', () => openEpreuveModal(ep, mod.nom));
        }
        epContainer.appendChild(line);
      });

      row.appendChild(epContainer);
    }

    list.appendChild(row);
  });
}

/* ── Vue UE (dynamique) ─────────────────────────────────────────────────── */
// Construite entièrement depuis les données JSON renvoyées par le serveur.
// Aucune valeur codée en dur : noms, codes, notes et modules viennent
// directement de l'HTML parsé d'OASIS.

function renderUes(ues) {
  const container = $('uesList');
  container.innerHTML = '';

  if (!ues.length) {
    container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">Aucune UE disponible.</p>';
    return;
  }

  // Palette de couleurs pour différencier les UEs (cyclique)
  const palettes = [
    ['rgba(108,99,255,0.22)', 'rgba(108,99,255,0.08)'],
    ['rgba(52,211,153,0.18)', 'rgba(52,211,153,0.06)'],
    ['rgba(251,191,36,0.20)', 'rgba(251,191,36,0.06)'],
    ['rgba(248,113,113,0.18)', 'rgba(248,113,113,0.06)'],
    ['rgba(167,139,250,0.20)', 'rgba(167,139,250,0.07)'],
  ];

  ues.forEach((ue, uei) => {
    const [c1, c2] = palettes[uei % palettes.length];
    const gc = gradeClass(ue.note);

    const banner = document.createElement('div');
    banner.className = 'ue-banner';
    banner.style.animationDelay = `${uei * 60}ms`;

    // ── En-tête UE ───────────────────────────────────────────────────
    const header = document.createElement('div');
    header.className = 'ue-header';
    header.style.background = `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`;
    header.innerHTML = `
      <div class="ue-title-block">
        <div class="ue-name">${ue.nom}</div>
        <div class="ue-code">${ue.code}</div>
      </div>
      ${ue.ects ? `<div class="ue-ects-badge">${ue.ects} ECTS</div>` : ''}
      <div class="ue-avg ${gc}">${ue.note !== null ? fmt(ue.note) + '\u00a0/ 20' : '\u2014'}</div>
    `;
    banner.appendChild(header);

    // ── Ligne stats UE ───────────────────────────────────────────────
    if (ue.min !== null || ue.max !== null || ue.moy_classe !== null) {
      const statsRow = document.createElement('div');
      statsRow.className = 'ue-stats';
      [
        { label: 'Moy. classe', value: fmt(ue.moy_classe), cls: colorClass(ue.moy_classe) },
        { label: 'Min',         value: fmt(ue.min),        cls: 'color-bad' },
        { label: 'Max',         value: fmt(ue.max),        cls: 'color-good' },
      ].forEach(s => {
        const cell = document.createElement('div');
        cell.className = 'ue-stat';
        cell.innerHTML = `
          <div class="ue-stat-label">${s.label}</div>
          <div class="ue-stat-value ${s.cls}">${s.value}</div>
        `;
        statsRow.appendChild(cell);
      });
      banner.appendChild(statsRow);
    }

    // ── Modules de cette UE ──────────────────────────────────────────
    const modsArea = document.createElement('div');
    modsArea.className = 'ue-modules';

    if (ue.modules.length === 0) {
      modsArea.innerHTML = '<p style="color:var(--muted);font-size:0.82rem;padding:4px 0">Aucun module.</p>';
    } else {
      ue.modules.forEach(mod => {
        const mgc      = gradeClass(mod.note);
        const hasGrade = mod.note !== null;
        const epreuves = mod.epreuves || [];

        const mRow = document.createElement('div');
        mRow.className = 'ue-module-row';

        // Ligne nom + note
        const mTop = document.createElement('div');
        mTop.className = 'ue-module-top';
        mTop.innerHTML = `
          <span class="ue-module-name" title="${mod.nom}">${mod.nom}</span>
          ${mod.coeff ? `<span class="ue-module-coeff">\u00d7${fmt(mod.coeff)}</span>` : ''}
          <span class="ue-module-grade ${mgc}"
                ${hasGrade ? 'role="button" tabindex="0" title="Voir les statistiques"' : ''}>
            ${hasGrade ? fmt(mod.note) + '\u00a0/ 20' : 'N/A'}
          </span>
        `;
        if (hasGrade) {
          const gel = mTop.querySelector('.ue-module-grade');
          gel.addEventListener('click', () => openModal(mod));
          gel.addEventListener('keydown', e => { if (e.key === 'Enter') openModal(mod); });
        }
        mRow.appendChild(mTop);

        // Épreuves sous le module
        if (epreuves.length > 0) {
          const epDiv = document.createElement('div');
          epDiv.className = 'ue-ep-divider';
          mRow.appendChild(epDiv);

          const epList = document.createElement('div');
          epList.className = 'ue-epreuves';

          epreuves.forEach(ep => {
            const epGc    = gradeClass(ep.note);
            const hasNote = ep.note !== null;
            const epLine  = document.createElement('div');
            epLine.className = 'ep-line';
            epLine.innerHTML = `
              <span class="ep-name" title="${ep.nom}">${ep.nom}</span>
              ${ep.date ? `<span class="ep-date">${ep.date}</span>` : ''}
              <span class="ep-dots"></span>
              <span class="ep-grade ${epGc}${hasNote ? ' clickable' : ''}">${hasNote ? fmt(ep.note) + '\u00a0/ 20' : '\u2014'}</span>
            `;
            if (hasNote) {
              epLine.querySelector('.ep-grade').addEventListener('click', () => openEpreuveModal(ep, mod.nom));
            }
            epList.appendChild(epLine);
          });
          mRow.appendChild(epList);
        }

        modsArea.appendChild(mRow);
      });
    }

    banner.appendChild(modsArea);
    container.appendChild(banner);
  });
}

/* ── Sélecteur de vue (Matières / Par UE) ───────────────────────────────── */
function setView(view) {
  currentView = view;
  $('viewModules').classList.toggle('active', view === 'modules');
  $('viewUes').classList.toggle('active', view === 'ues');
  $('modulesList').style.display = view === 'modules' ? 'flex' : 'none';
  $('uesList').style.display     = view === 'ues'     ? 'flex' : 'none';
}

$('viewModules').addEventListener('click', () => setView('modules'));
$('viewUes').addEventListener('click',     () => setView('ues'));

/* ── Modal épreuve (sous-note) ──────────────────────────────────────── */
function openEpreuveModal(ep, nomModule) {
  // Grand titre = nom de l'épreuve, sous-titre = matière parente
  $('modalSubjectName').textContent = ep.nom;
  $('modalSubjectSigle').textContent = nomModule;

  // Grade hero — note de l'épreuve
  const gradeEl = $('modalGradeValue');
  gradeEl.textContent = fmt(ep.note) + '\u00a0/ 20';
  gradeEl.className   = 'grade-value ' + colorClass(ep.note);

  // Stats grid
  const stats = [
    { label: 'Moyenne classe', value: fmt(ep.moy_classe), cls: colorClass(ep.moy_classe) },
    { label: 'Coefficient',    value: fmt(ep.coeff),      cls: '' },
    { label: 'Note minimale',  value: fmt(ep.min),        cls: 'color-bad' },
    { label: 'Note maximale',  value: fmt(ep.max),        cls: 'color-good' },
  ];
  $('modalStats').innerHTML = stats.map(s => `
    <div class="stat-card">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value ${s.cls}">${s.value}</div>
    </div>
  `).join('');

  // Barre de positionnement
  const barWrap = $('modalBarWrap');
  if (ep.min !== null && ep.max !== null && ep.note !== null && ep.max > ep.min) {
    barWrap.style.display = 'block';
    const pct = ((ep.note - ep.min) / (ep.max - ep.min)) * 100;
    setTimeout(() => {
      $('modalBarFill').style.width = Math.max(0, Math.min(100, pct)) + '%';
    }, 50);
    $('barLegendMin').textContent = `Min\u00a0: ${fmt(ep.min)}`;
    $('barLegendMoy').textContent = `Moy\u00a0: ${fmt(ep.moy_classe)}`;
    $('barLegendMax').textContent = `Max\u00a0: ${fmt(ep.max)}`;
  } else {
    barWrap.style.display = 'none';
  }

  // Pas d'épreuves dans une épreuve
  $('epreuvesSection').style.display = 'none';

  // Date en sous-titre
  $('modalSubjectSigle').textContent = ep.date
    ? `${nomModule} \u2014 ${ep.date}`
    : nomModule;

  $('modalOverlay').classList.add('open');
}

/* ── Modal module ──────────────────────────────────────────────────── */
function openModal(mod) {
  // Grand titre de la matière
  $('modalSubjectName').textContent = mod.nom;
  $('modalSubjectSigle').textContent = mod.sigle || '';

  // Grade hero — note globale du module
  const gradeEl = $('modalGradeValue');
  gradeEl.textContent = fmt(mod.note) + ' / 20';
  gradeEl.className   = 'grade-value ' + colorClass(mod.note);

  // Stats grid
  const stats = [
    { label: 'Moyenne classe', value: fmt(mod.moy_classe), cls: colorClass(mod.moy_classe) },
    { label: 'Coefficient',    value: fmt(mod.coeff),      cls: '' },
    { label: 'Note minimale',  value: fmt(mod.min),        cls: 'color-bad' },
    { label: 'Note maximale',  value: fmt(mod.max),        cls: 'color-good' },
  ];
  $('modalStats').innerHTML = stats.map(s => `
    <div class="stat-card">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value ${s.cls}">${s.value}</div>
    </div>
  `).join('');

  // Barre de positionnement
  const barWrap = $('modalBarWrap');
  if (mod.min !== null && mod.max !== null && mod.note !== null && mod.max > mod.min) {
    barWrap.style.display = 'block';
    const pct = ((mod.note - mod.min) / (mod.max - mod.min)) * 100;
    setTimeout(() => {
      $('modalBarFill').style.width = Math.max(0, Math.min(100, pct)) + '%';
    }, 50);
    $('barLegendMin').textContent = `Min : ${fmt(mod.min)}`;
    $('barLegendMoy').textContent = `Moy : ${fmt(mod.moy_classe)}`;
    $('barLegendMax').textContent = `Max : ${fmt(mod.max)}`;
  } else {
    barWrap.style.display = 'none';
  }

  // ── Épreuves individuelles ───────────────────────────────────────────
  const epreuves = mod.epreuves || [];
  const epSection = $('epreuvesSection');
  const epList    = $('epreuvesList');
  epList.innerHTML = '';

  if (epreuves.length === 0) {
    epSection.style.display = 'none';
  } else {
    epSection.style.display = 'block';
    epreuves.forEach((ep, i) => {
      const hasNote = ep.note !== null;
      const gc      = gradeClass(ep.note);

      // Mini-barre de positionnement par épreuve
      let miniBarHTML = '';
      if (hasNote && ep.min !== null && ep.max !== null && ep.max > ep.min) {
        const pct = Math.max(0, Math.min(100,
          ((ep.note - ep.min) / (ep.max - ep.min)) * 100
        ));
        miniBarHTML = `
          <div class="epreuve-minibar">
            <div class="epreuve-minibar-fill" style="width:0%" data-pct="${pct}"></div>
          </div>`;
      }

      const row = document.createElement('div');
      row.className = 'epreuve-row';
      row.style.animationDelay = `${i * 35}ms`;
      row.innerHTML = `
        <div class="epreuve-info">
          <div class="epreuve-nom">${ep.nom}</div>
          ${ep.date ? `<div class="epreuve-date">${ep.date}</div>` : ''}
        </div>
        ${miniBarHTML}
        <div class="epreuve-right">
          <span class="epreuve-grade ${gc}">${hasNote ? fmt(ep.note) + ' / 20' : '—'}</span>
          ${ep.coeff ? `<span class="epreuve-coeff">×${fmt(ep.coeff)}</span>` : ''}
        </div>
      `;
      epList.appendChild(row);
    });

    // Animer les mini-barres après insertion
    setTimeout(() => {
      epList.querySelectorAll('.epreuve-minibar-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 80);
  }

  $('modalOverlay').classList.add('open');
}

function closeModal() {
  $('modalOverlay').classList.remove('open');
  $('modalBarFill').style.width = '0%';
}

$('modalClose').addEventListener('click', closeModal);
$('modalOverlay').addEventListener('click', e => {
  if (e.target === $('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ── Logout ─────────────────────────────────────────────────────────────── */
$('logoutBtn').addEventListener('click', () => {
  allData    = null;
